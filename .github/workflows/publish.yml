name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Determine version
        run: |
          LATEST=$(git tag --sort=-v:refname 2>/dev/null | grep -E '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="0.0.1"
          else
            PATCH=$(echo "$LATEST" | grep -oP '\d+\.\d+\.\K\d+')
            VERSION="0.0.$((PATCH + 1))"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - run: sed -i "s/version = \"0.0.0\"/version = \"$VERSION\"/" pyproject.toml
      - run: pip install build twine
      - run: PYTHONSAFEPATH=1 python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      - name: Tag and Release
        run: |
          git tag "v${VERSION}" 2>/dev/null || echo "Tag exists"
          git push --tags
          if [ -f CHANGELOG.md ]; then
            gh release create "v${VERSION}" --title "v${VERSION}" --notes-file CHANGELOG.md
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
